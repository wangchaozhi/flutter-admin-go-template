services:
  postgres:
    image: postgres:16-alpine
    container_name: flutter-admin-go-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flutter_admin_go
      POSTGRES_USER: admin_go
      POSTGRES_PASSWORD: admin_go_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_go -d flutter_admin_go"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: flutter-admin-go-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin_go
      MINIO_ROOT_PASSWORD: admin_go_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  minio_data:
